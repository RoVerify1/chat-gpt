<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anmeldung mit OTP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="email"],
        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="email"]:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }

        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .hidden {
            display: none;
        }

        .otp-section {
            text-align: center;
        }

        .otp-input {
            letter-spacing: 5px;
            text-align: center;
            font-size: 24px !important;
            font-weight: bold;
        }

        .resend-link {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .resend-link a {
            color: #667eea;
            text-decoration: none;
            cursor: pointer;
        }

        .resend-link a:hover {
            text-decoration: underline;
        }

        .user-info {
            text-align: center;
            padding: 20px;
        }

        .user-info h2 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .user-info p {
            color: #666;
            font-size: 14px;
        }

        .logout-btn {
            margin-top: 20px;
            background: #f44336;
        }

        .logout-btn:hover {
            box-shadow: 0 5px 20px rgba(244, 67, 54, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Schritt 1: E-Mail Eingabe -->
        <div id="emailSection">
            <h1>Anmeldung</h1>
            <p class="subtitle">Gib deine E-Mail-Adresse ein, um einen Anmelde-Code zu erhalten</p>
            
            <div id="emailMessage" class="message hidden"></div>
            
            <form id="emailForm">
                <div class="form-group">
                    <label for="email">E-Mail-Adresse</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="deine@email.com" 
                        required
                    >
                </div>
                <button type="submit" id="sendOtpBtn">Code anfordern</button>
            </form>
        </div>

        <!-- Schritt 2: OTP Eingabe -->
        <div id="otpSection" class="hidden">
            <h1>Code eingeben</h1>
            <p class="subtitle">Wir haben einen 6-stelligen Code an <span id="userEmail"></span> gesendet</p>
            
            <div id="otpMessage" class="message hidden"></div>
            
            <form id="otpForm" class="otp-section">
                <div class="form-group">
                    <label for="otp">Anmelde-Code</label>
                    <input 
                        type="text" 
                        id="otp" 
                        name="otp" 
                        class="otp-input"
                        placeholder="000000" 
                        maxlength="6"
                        pattern="[0-9]{6}"
                        required
                    >
                </div>
                <button type="submit" id="verifyOtpBtn">Anmelden</button>
            </form>
            
            <div class="resend-link">
                <p>Keinen Code erhalten? <a id="resendLink">Neuen Code senden</a></p>
            </div>
        </div>

        <!-- Schritt 3: Angemeldet -->
        <div id="loggedInSection" class="hidden">
            <div class="user-info">
                <h1>Willkommen! 🎉</h1>
                <p>Du hast dich erfolgreich angemeldet.</p>
                <h2 id="loggedInEmail"></h2>
                <button class="logout-btn" onclick="logout()">Abmelden</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        
        let currentEmail = '';

        // DOM Elemente
        const emailSection = document.getElementById('emailSection');
        const otpSection = document.getElementById('otpSection');
        const loggedInSection = document.getElementById('loggedInSection');
        const emailForm = document.getElementById('emailForm');
        const otpForm = document.getElementById('otpForm');
        const emailInput = document.getElementById('email');
        const otpInput = document.getElementById('otp');
        const userEmailSpan = document.getElementById('userEmail');
        const loggedInEmailH2 = document.getElementById('loggedInEmail');
        const emailMessage = document.getElementById('emailMessage');
        const otpMessage = document.getElementById('otpMessage');
        const sendOtpBtn = document.getElementById('sendOtpBtn');
        const verifyOtpBtn = document.getElementById('verifyOtpBtn');
        const resendLink = document.getElementById('resendLink');

        // Nachricht anzeigen
        function showMessage(element, message, isSuccess) {
            element.textContent = message;
            element.className = `message ${isSuccess ? 'success' : 'error'}`;
            element.classList.remove('hidden');
        }

        // Nachricht ausblenden
        function hideMessage(element) {
            element.classList.add('hidden');
        }

        // E-Mail Formular absenden
        emailForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessage(emailMessage);
            
            const email = emailInput.value.trim();
            currentEmail = email;
            
            sendOtpBtn.disabled = true;
            sendOtpBtn.textContent = 'Wird gesendet...';
            
            try {
                const response = await fetch(`${API_URL}/request-otp`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage(emailMessage, data.message, true);
                    
                    // Zu OTP-Sektion wechseln
                    setTimeout(() => {
                        emailSection.classList.add('hidden');
                        otpSection.classList.remove('hidden');
                        userEmailSpan.textContent = email;
                        otpInput.focus();
                    }, 1000);
                } else {
                    showMessage(emailMessage, data.message, false);
                }
            } catch (error) {
                showMessage(emailMessage, 'Ein Fehler ist aufgetreten. Bitte versuche es später erneut.', false);
                console.error('Error:', error);
            } finally {
                sendOtpBtn.disabled = false;
                sendOtpBtn.textContent = 'Code anfordern';
            }
        });

        // OTP Formular absenden
        otpForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessage(otpMessage);
            
            const otp = otpInput.value.trim();
            
            verifyOtpBtn.disabled = true;
            verifyOtpBtn.textContent = 'Wird überprüft...';
            
            try {
                const response = await fetch(`${API_URL}/verify-otp`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email: currentEmail, otp })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage(otpMessage, data.message, true);
                    
                    // Zu Logged-In-Sektion wechseln
                    setTimeout(() => {
                        otpSection.classList.add('hidden');
                        loggedInSection.classList.remove('hidden');
                        loggedInEmailH2.textContent = currentEmail;
                    }, 1000);
                } else {
                    showMessage(otpMessage, data.message, false);
                }
            } catch (error) {
                showMessage(otpMessage, 'Ein Fehler ist aufgetreten. Bitte versuche es später erneut.', false);
                console.error('Error:', error);
            } finally {
                verifyOtpBtn.disabled = false;
                verifyOtpBtn.textContent = 'Anmelden';
            }
        });

        // Code erneut senden
        resendLink.addEventListener('click', async () => {
            hideMessage(otpMessage);
            
            resendLink.textContent = 'Wird gesendet...';
            resendLink.style.pointerEvents = 'none';
            
            try {
                const response = await fetch(`${API_URL}/request-otp`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email: currentEmail })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage(otpMessage, 'Ein neuer Code wurde gesendet!', true);
                } else {
                    showMessage(otpMessage, data.message, false);
                }
            } catch (error) {
                showMessage(otpMessage, 'Ein Fehler ist aufgetreten. Bitte versuche es später erneut.', false);
                console.error('Error:', error);
            } finally {
                setTimeout(() => {
                    resendLink.textContent = 'Neuen Code senden';
                    resendLink.style.pointerEvents = 'auto';
                }, 3000);
            }
        });

        // Abmelden
        function logout() {
            currentEmail = '';
            emailInput.value = '';
            otpInput.value = '';
            hideMessage(emailMessage);
            hideMessage(otpMessage);
            
            loggedInSection.classList.add('hidden');
            emailSection.classList.remove('hidden');
        }

        // Nur Zahlen im OTP-Feld erlauben
        otpInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
        });
    </script>
</body>
</html>
