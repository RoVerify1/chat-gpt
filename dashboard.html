<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RobloxAuth - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        :root {
            --orange: #FF6B35; --red: #FF4500; --bg: #0f0f1e;
            --card: rgba(255,255,255,0.03); --text: #fff; --gray: #a0a0b0;
            --border: rgba(255,107,53,0.3); --success: #00C853; --error: #FF1744;
        }
        body {
            background: linear-gradient(135deg, var(--bg), #1a0f0f, var(--bg));
            min-height: 100vh; color: var(--text);
        }
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px; background: rgba(15,15,30,0.8);
            border-bottom: 1px solid var(--border);
        }
        .logo {
            display: flex; align-items: center; gap: 12px; font-size: 24px; font-weight: 800;
            background: linear-gradient(135deg, var(--orange), var(--red));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            cursor: pointer;
        }
        .logo-icon {
            width: 40px; height: 40px; background: linear-gradient(135deg, var(--orange), var(--red));
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
        }
        .logo-icon::before {
            content: ''; width: 60%; height: 60%; background: white; border-radius: 4px;
        }
        .btn {
            padding: 10px 24px; border: none; border-radius: 25px; cursor: pointer;
            font-weight: 600; display: inline-flex; align-items: center; gap: 8px;
        }
        .btn-logout { background: var(--error); color: white; }
        .dashboard {
            max-width: 1000px; margin: 40px auto; padding: 0 20px;
        }
        .welcome {
            margin-bottom: 30px; text-align: center;
        }
        .welcome h1 {
            font-size: 32px; margin-bottom: 10px;
            background: linear-gradient(135deg, #fff, var(--orange));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }
        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 20px; padding: 30px;
        }
        .card-header {
            display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
            font-size: 20px; font-weight: 700; padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }
        .card-header i { color: var(--orange); }
        .profile { text-align: center; }
        .avatar {
            width: 100px; height: 100px; border-radius: 50%;
            border: 3px solid var(--orange); margin-bottom: 15px;
        }
        .username { font-size: 22px; font-weight: 700; margin-bottom: 5px; }
        .discriminator { color: var(--gray); margin-bottom: 20px; }
        .info-row {
            display: flex; justify-content: space-between; padding: 10px 0;
            border-bottom: 1px solid var(--border); font-size: 14px;
        }
        .info-label { color: var(--gray); }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; margin-bottom: 8px; color: var(--gray); font-size: 14px;
        }
        .form-group input {
            width: 100%; padding: 12px; border: 2px solid var(--border);
            border-radius: 12px; background: rgba(0,0,0,0.3); color: white;
            font-size: 15px;
        }
        .form-group input:focus {
            outline: none; border-color: var(--orange);
        }
        .btn-primary {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, var(--orange), var(--red));
            color: white; border: none; border-radius: 12px;
            font-weight: 600; cursor: pointer; transition: all 0.3s;
        }
        .btn-primary:hover { transform: translateY(-2px); }
        .alert {
            padding: 12px 15px; border-radius: 10px; margin-bottom: 15px;
            display: none; font-size: 14px;
        }
        .alert.show { display: block; }
        .alert-success { background: rgba(0,200,83,0.1); border: 1px solid var(--success); color: var(--success); }
        .alert-error { background: rgba(255,23,68,0.1); border: 1px solid var(--error); color: var(--error); }
        .status-box {
            text-align: center; padding: 25px; border-radius: 15px;
            margin-bottom: 20px; border: 2px solid;
        }
        .status-box.pending {
            background: rgba(255,193,7,0.1); border-color: #FFC107;
        }
        .status-box.verified {
            background: rgba(0,200,83,0.1); border-color: var(--success);
        }
        .status-box i { font-size: 36px; margin-bottom: 10px; display: block; }
        .status-box.pending i { color: #FFC107; }
        .status-box.verified i { color: var(--success); }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <nav>
        <div class="logo" onclick="window.location.href='/'">
            <div class="logo-icon"></div>
            RobloxAuth
        </div>
        <button class="btn btn-logout" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> Logout
        </button>
    </nav>

    <div class="dashboard">
        <div class="welcome">
            <h1>Willkommen, <span id="welcomeName">User</span>! 👋</h1>
            <p style="color: var(--gray);">Dein Dashboard</p>
        </div>

        <div class="grid">
            <!-- Discord Profil -->
            <div class="card">
                <div class="card-header">
                    <i class="fab fa-discord"></i> Discord Profil
                </div>
                <div class="profile">
                    <img id="avatar" class="avatar" src="" alt="Avatar">
                    <div class="username" id="username">-</div>
                    <div class="discriminator" id="discriminator">#0000</div>
                    <div class="info-row">
                        <span class="info-label">User ID</span>
                        <span id="userId">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">E-Mail</span>
                        <span id="email">-</span>
                    </div>
                </div>
            </div>

            <!-- Roblox Verifizierung -->
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-gamepad"></i> Roblox Verifizierung
                </div>
                
                <div id="alertBox" class="alert"></div>

                <div id="verifyStatus" class="status-box pending">
                    <i class="fas fa-clock"></i>
                    <strong>Nicht verifiziert</strong>
                    <p style="color: var(--gray); margin-top: 8px; font-size: 14px;">
                        Gib deinen Roblox-Username ein
                    </p>
                </div>

                <form id="robloxForm" onsubmit="verifyRoblox(event)">
                    <div class="form-group">
                        <label>Roblox Username</label>
                        <input type="text" id="robloxUsername" placeholder="DeinName" required>
                    </div>
                    <button type="submit" class="btn-primary" id="verifyBtn">
                        <i class="fas fa-check"></i> Verifizieren
                    </button>
                </form>

                <div id="robloxInfo" class="hidden" style="margin-top: 20px;">
                    <div class="info-row">
                        <span class="info-label">Roblox ID</span>
                        <span id="robloxId">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Display Name</span>
                        <span id="robloxDisplay">-</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let userData = null;

        // NUR beim ersten Laden ausführen
        window.addEventListener('DOMContentLoaded', () => {
            const stored = localStorage.getItem('robloxauth_user');
            if (stored) {
                userData = JSON.parse(stored);
                displayData();
            } else {
                // Keine Daten? Zur Homepage
                window.location.href = '/';
            }
        });

        function displayData() {
            if (!userData?.discord) return;
            const d = userData.discord;
            
            document.getElementById('welcomeName').textContent = d.username;
            document.getElementById('username').textContent = d.username;
            document.getElementById('discriminator').textContent = '#' + d.discriminator;
            document.getElementById('userId').textContent = d.id;
            document.getElementById('email').textContent = d.email || 'Nicht öffentlich';
            
            const avatarUrl = d.avatar ? 
                `https://cdn.discordapp.com/avatars/${d.id}/${d.avatar}.png` :
                `https://cdn.discordapp.com/embed/avatars/${parseInt(d.discriminator) % 5}.png`;
            document.getElementById('avatar').src = avatarUrl;

            if (userData.verified && userData.roblox) {
                showVerified();
            }
        }

        function showVerified() {
            const box = document.getElementById('verifyStatus');
            box.className = 'status-box verified';
            box.innerHTML = `
                <i class="fas fa-check-circle"></i>
                <strong style="color: var(--success);">Verifiziert ✓</strong>
                <p style="color: var(--gray); margin-top: 8px; font-size: 14px;">
                    Account erfolgreich verknüpft
                </p>
            `;
            document.getElementById('robloxInfo').classList.remove('hidden');
            document.getElementById('robloxId').textContent = userData.roblox.id;
            document.getElementById('robloxDisplay').textContent = userData.roblox.displayName;
        }

        async function verifyRoblox(e) {
            e.preventDefault();
            const username = document.getElementById('robloxUsername').value.trim();
            const btn = document.getElementById('verifyBtn');
            const original = btn.innerHTML;

            btn.innerHTML = '⏳ Wird überprüft...';
            btn.disabled = true;

            try {
                const res = await fetch('https://users.roblox.com/v1/usernames/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usernames: [username], excludeBannedUsers: true })
                });
                const data = await res.json();

                if (data.data?.[0]) {
                    const u = data.data[0];
                    userData.roblox = { id: u.id, username: u.name, displayName: u.displayName };
                    userData.verified = true;
                    localStorage.setItem('robloxauth_user', JSON.stringify(userData));
                    
                    showAlert('✓ Erfolgreich verifiziert!', 'success');
                    showVerified();
                } else {
                    showAlert('✗ Account nicht gefunden', 'error');
                }
            } catch {
                showAlert('✗ Fehler bei der Verbindung', 'error');
            }

            btn.innerHTML = original;
            btn.disabled = false;
        }

        function showAlert(msg, type) {
            const a = document.getElementById('alertBox');
            a.textContent = msg;
            a.className = `alert show alert-${type}`;
            setTimeout(() => a.classList.remove('show'), 4000);
        }

        function logout() {
            localStorage.removeItem('robloxauth_user');
            window.location.href = '/';
        }
    </script>
</body>
</html>
